<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Todo App</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SIGNUP PAGE -->
  <div class="container" id="signupPage">

    <div class="card">

      <h1>Create Account</h1>

      <input
        type="text"
        id="signupName"
        placeholder="Full Name"
      >

      <input
        type="email"
        id="signupEmail"
        placeholder="Email Address"
      >

      <input
        type="password"
        id="signupPassword"
        placeholder="Password"
      >

      <button onclick="signup()">
        Sign Up
      </button>

      <p>
        Already have an account?
        <span onclick="showLogin()">
          Login
        </span>
      </p>

    </div>

  </div>


  <!-- LOGIN PAGE -->
  <div class="container hidden" id="loginPage">

    <div class="card">

      <h1>Welcome Back</h1>

      <input
        type="email"
        id="loginEmail"
        placeholder="Enter Email"
      >

      <input
        type="password"
        id="loginPassword"
        placeholder="Enter Password"
      >

      <button onclick="login()">
        Login
      </button>

      <p>
        Don't have an account?
        <span onclick="showSignup()">
          Sign Up
        </span>
      </p>

    </div>

  </div>


  <!-- DASHBOARD -->
  <div class="container hidden" id="dashboardPage">

    <div class="dashboard">

      <!-- PROFILE -->
      <div
        class="profile"
        id="profileLetter"
      >
        B
      </div>

      <!-- HELLO -->
      <h1 id="welcomeText">
        Hello 👋
      </h1>


      <!-- TODO INPUT -->
      <div class="todoTop">

        <input
          type="text"
          id="taskInput"
          placeholder="Enter Task"
        >

        <button onclick="addTask()">
          Add
        </button>

      </div>


      <!-- STATS -->
      <div class="stats">

        <p>
          Total:
          <span id="totalTasks">
            0
          </span>
        </p>

        <p>
          Completed:
          <span id="completedTasks">
            0
          </span>
        </p>

      </div>


      <!-- TASK LIST -->
      <ul id="taskList"></ul>


      <!-- LOGOUT -->
      <button
        class="logoutBtn"
        onclick="logout()"
      >
        Logout
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
